name: dubbridge
description: DubBridge - AI Transcription & Translation Studio
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  google_sign_in: ^6.2.1

  # Supabase
  supabase_flutter: ^2.3.4

  # Routing
  go_router: ^13.1.0

  # HTTP & Networking
  http: ^1.2.0
  dio: ^5.4.1

  # File Handling
  file_picker: ^6.1.1
  path_provider: ^2.1.2
  permission_handler: ^11.2.0

  # Media
  just_audio: ^0.9.36
  video_player: ^2.8.2

  # UI
  lottie: ^3.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9

  # Storage & Local
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  mime: ^1.0.5
  share_plus: ^7.2.2

  # Notifications
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
